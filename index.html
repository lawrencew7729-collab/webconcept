<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMA Digital Visual Lab</title>
    <!-- 引入 React 核心库 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 用于解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // 图标组件 (使用内联 SVG 确保无需依赖即可运行)
        const Icons = {
            Palette: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.92 0 1.5-.58 1.5-1.5 0-.43-.17-.83-.44-1.14-.24-.28-.36-.64-.36-1.02 0-.83.67-1.5 1.5-1.5H16c2.21 0 4-1.79 4-4 0-5-4.03-9-9-9z"/></svg>,
            Layers: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
            Zap: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
            SunMoon: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>,
            Layout: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/></svg>,
            Box: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>,
            Image: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>,
            Check: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        };

        const CONFIG = {
            phoneNumber: "60165506664",
            businessName: "HMA Digital Sdn Bhd",
            i18n: {
                en: { next: "Next", prev: "Back", viewResult: "View Result", restart: "Restart", send: "Send via WhatsApp", summary: "Summary", completed: "Completed", subText: "Ready to send.", step: "Step", of: "of" },
                bm: { next: "Seterusnya", prev: "Kembali", viewResult: "Lihat Hasil", restart: "Mula Semula", send: "Hantar WhatsApp", summary: "Ringkasan", completed: "Selesai", subText: "Sedia untuk dihantar.", step: "Langkah", of: "daripada" },
                zh: { next: "下一步", prev: "上一步", viewResult: "查看结果", restart: "重新开始", send: "发送 WhatsApp", summary: "摘要", completed: "完成", subText: "配置已就绪。", step: "步骤", of: "/" }
            },
            questions: [
                {
                    id: "A",
                    title: { zh: "颜色风格", en: "Color Style", bm: "Gaya Warna" },
                    icon: <Icons.Palette />,
                    type: "color",
                    options: [
                        { id: "A1", label: { zh: "极简纯色", en: "Minimalist", bm: "Minimalis" }, desc: { zh: "黑白灰", en: "B&W base", bm: "Asas B&W" }, colors: ["#000000", "#ffffff", "#f4f4f4"] },
                        { id: "A2", label: { zh: "科技商务", en: "Corporate", bm: "Korporat" }, desc: { zh: "专业深蓝", en: "Tech blue", bm: "Biru" }, colors: ["#0033ff", "#001a4d", "#e6f0ff"] },
                        { id: "A3", label: { zh: "活力", en: "Vibrant", bm: "Bertenaga" }, desc: { zh: "鲜艳对比", en: "Contrast", bm: "Kontras" }, colors: ["#ff4d4d", "#ffcc00", "#00cc99"] }
                    ]
                },
                {
                    id: "B",
                    title: { zh: "画面精细度", en: "Visual Detail", bm: "Perincian" },
                    icon: <Icons.Layers />,
                    type: "visual-detail",
                    options: [
                        { id: "B1", label: { zh: "扁平化", en: "Flat", bm: "Flat" }, desc: { zh: "二维简约", en: "2D", bm: "2D" }, preview: <div className="w-full h-8 bg-blue-500 rounded"></div> },
                        { id: "B2", label: { zh: "微渐变", en: "Gradient", bm: "Gradien" }, desc: { zh: "深度质感", en: "Depth", bm: "Kedalaman" }, preview: <div className="w-full h-8 bg-gradient-to-r from-blue-400 to-blue-600 rounded shadow-sm"></div> },
                        { id: "B3", label: { zh: "3D拟物", en: "3D", bm: "3D" }, desc: { zh: "写实细节", en: "Realistic", bm: "Realistik" }, preview: <div className="w-full h-8 bg-gradient-to-br from-blue-300 to-blue-800 rounded shadow-inner border border-blue-400/30"></div> }
                    ]
                },
                {
                    id: "C",
                    title: { zh: "色调倾向", en: "Tone", bm: "Nada" },
                    icon: <Icons.Zap />,
                    type: "gradient",
                    options: [
                        { id: "C1", label: { zh: "冷色系", en: "Cool", bm: "Sejuk" }, desc: { zh: "冷静专业", en: "Rational", bm: "Rasional" }, gradient: "linear-gradient(90deg, #1e3a8a, #3b82f6)" },
                        { id: "C2", label: { zh: "暖色系", en: "Warm", bm: "Panas" }, desc: { zh: "亲和热情", en: "Friendly", bm: "Mesra" }, gradient: "linear-gradient(90deg, #991b1b, #ef4444)" },
                        { id: "C3", label: { zh: "中性灰", en: "Neutral", bm: "Neutral" }, desc: { zh: "稳重工业", en: "Steady", bm: "Mantap" }, gradient: "linear-gradient(90deg, #374151, #9ca3af)" }
                    ]
                },
                {
                    id: "D",
                    title: { zh: "背景模式", en: "Background", bm: "Latar" },
                    icon: <Icons.SunMoon />,
                    type: "contrast",
                    options: [
                        { id: "D1", label: "Dark Mode", desc: { zh: "深色", en: "Dark", bm: "Gelap" }, bg: "#1a1a1a", text: "#ffffff" },
                        { id: "D2", label: "Light Mode", desc: { zh: "浅色", en: "Light", bm: "Terang" }, bg: "#ffffff", text: "#1a1a1a" },
                        { id: "D3", label: "Contrast", desc: { zh: "高对比", en: "Contrast", bm: "Kontras" }, bg: "#000000", text: "#ffff00" }
                    ]
                },
                {
                    id: "E",
                    title: { zh: "排版布局", en: "Layout", bm: "Susunan" },
                    icon: <Icons.Layout />,
                    type: "layout-preview",
                    options: [
                        { id: "E1", label: { zh: "单栏", en: "Single", bm: "Satu" }, desc: { zh: "画轴式", en: "Scroll", bm: "Skrol" }, preview: <div className="h-6 w-full bg-gray-200 rounded"></div> },
                        { id: "E2", label: { zh: "网格", en: "Grid", bm: "Grid" }, desc: { zh: "卡片式", en: "Cards", bm: "Kad" }, preview: <div className="grid grid-cols-2 gap-1"><div className="h-6 bg-gray-200 rounded"></div><div className="h-6 bg-gray-200 rounded"></div></div> }
                    ]
                }
            ]
        };

        function App() {
            const [lang, setLang] = useState('zh');
            const [step, setStep] = useState(0);
            const [sel, setSel] = useState({});
            const [done, setDone] = useState(false);

            const t = CONFIG.i18n[lang];
            const q = CONFIG.questions[step];

            const next = () => step < CONFIG.questions.length - 1 ? setStep(step + 1) : setDone(true);
            const prev = () => step > 0 && setStep(step - 1);
            
            const send = () => {
                let msg = `HMA Digital Design Interest:\n`;
                CONFIG.questions.forEach(item => {
                    const o = item.options.find(opt => opt.id === sel[item.id]);
                    if(o) msg += `- ${item.title.en}: ${o.label.en || o.label}\n`;
                });
                window.open(`https://wa.me/${CONFIG.phoneNumber}?text=${encodeURIComponent(msg)}`, '_blank');
            };

            if (done) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center">
                        <div className="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 text-white"><Icons.Check /></div>
                        <h2 className="text-2xl font-black mb-2">{t.completed}</h2>
                        <p className="text-gray-400 mb-8">{t.subText}</p>
                        <button onClick={send} className="w-full bg-green-600 text-white font-bold py-4 rounded-2xl mb-4 shadow-lg active:scale-95 transition-all">{t.send}</button>
                        <button onClick={() => {setStep(0); setSel({}); setDone(false);}} className="text-gray-400 text-sm">{t.restart}</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col items-center">
                    <header className="w-full bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50">
                        <div><h1 className="font-black text-lg">{CONFIG.businessName}</h1></div>
                        <div className="flex bg-gray-100 p-1 rounded-lg">
                            {['en', 'bm', 'zh'].map(l => (
                                <button key={l} onClick={() => setLang(l)} className={`px-3 py-1 text-xs font-bold rounded-md ${lang === l ? 'bg-white shadow-sm' : 'text-gray-400'}`}>{l.toUpperCase()}</button>
                            ))}
                        </div>
                    </header>

                    <div className="w-full max-w-xl p-4 mt-8">
                        <div className="mb-8">
                            <div className="flex justify-between text-[10px] font-bold text-gray-400 uppercase mb-2"><span>{t.step} {step+1} {t.of} {CONFIG.questions.length}</span><span>{Math.round(((step+1)/CONFIG.questions.length)*100)}%</span></div>
                            <div className="h-1.5 bg-gray-200 rounded-full overflow-hidden"><div className="h-full bg-green-500 transition-all" style={{width:`${((step+1)/CONFIG.questions.length)*100}%`}}></div></div>
                        </div>

                        <div className="bg-white rounded-[2rem] shadow-xl p-8 border border-gray-100">
                            <div className="flex items-center gap-4 mb-8">
                                <div className="p-3 bg-green-50 text-green-600 rounded-xl">{q.icon}</div>
                                <h2 className="text-xl font-black">{q.title[lang]}</h2>
                            </div>

                            <div className="grid grid-cols-2 gap-4 mb-8">
                                {q.options.map(o => (
                                    <div key={o.id} onClick={() => setSel({...sel, [q.id]: o.id})} className={`p-4 rounded-2xl border-2 cursor-pointer transition-all ${sel[q.id] === o.id ? 'border-green-600 bg-green-50' : 'border-gray-50 bg-gray-50 hover:border-gray-200'}`}>
                                        <div className="flex justify-between mb-2"><span className="text-xs font-bold">{o.label[lang] || o.label}</span>{sel[q.id] === o.id && <span className="text-green-600"><Icons.Check /></span>}</div>
                                        {o.colors && <div className="flex gap-1 mb-2">{o.colors.map(c => <div key={c} className="h-3 flex-1 rounded-full border border-white/20" style={{backgroundColor:c}}></div>)}</div>}
                                        {o.gradient && <div className="h-3 w-full rounded-full mb-2" style={{background:o.gradient}}></div>}
                                        {o.preview && <div className="mb-2 opacity-80">{o.preview}</div>}
                                        <p className="text-[10px] text-gray-400">{o.desc[lang]}</p>
                                    </div>
                                ))}
                            </div>

                            <div className="flex gap-4">
                                <button onClick={prev} disabled={step===0} className={`flex-1 py-4 font-bold rounded-2xl ${step===0?'text-gray-200':'text-gray-400'}`}>{t.prev}</button>
                                <button onClick={next} disabled={!sel[q.id]} className={`flex-[2] py-4 font-bold rounded-2xl shadow-lg transition-all active:scale-95 ${sel[q.id]?'bg-green-600 text-white':'bg-gray-100 text-gray-300'}`}>{step === CONFIG.questions.length-1 ? t.viewResult : t.next}</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

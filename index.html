<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HMA Digital Visual Lab</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const Icons = {
            Palette: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.92 0 1.5-.58 1.5-1.5 0-.43-.17-.83-.44-1.14-.24-.28-.36-.64-.36-1.02 0-.83.67-1.5 1.5-1.5H16c2.21 0 4-1.79 4-4 0-5-4.03-9-9-9z"/></svg>,
            Layers: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/></svg>,
            Zap: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
            SunMoon: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>,
            Layout: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/></svg>,
            Type: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>,
            Maximize: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>,
            Check: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        };

        const CONFIG = {
            phoneNumber: "60165506664",
            businessName: "HMA Digital Sdn Bhd",
            i18n: {
                en: { next: "Next", prev: "Back", viewResult: "Finish", restart: "Restart", send: "Send WhatsApp", completed: "Selections Ready", step: "Step", of: "of" },
                bm: { next: "Seterusnya", prev: "Kembali", viewResult: "Selesai", restart: "Mula Semula", send: "Hantar WhatsApp", completed: "Siap", step: "Langkah", of: "daripada" },
                zh: { next: "下一步", prev: "上一步", viewResult: "查看结果", restart: "重新开始", send: "发送 WhatsApp", completed: "配置完成", step: "步骤", of: "/" }
            },
            questions: [
                {
                    id: "A",
                    title: { zh: "颜色风格", en: "Color Style", bm: "Gaya Warna" },
                    icon: <Icons.Palette />,
                    options: [
                        { id: "A1", label: { zh: "极简", en: "Minimal", bm: "Minimal" }, colors: ["#000000", "#ffffff", "#f4f4f4"] },
                        { id: "A2", label: { zh: "科技", en: "Tech", bm: "Tekno" }, colors: ["#0033ff", "#001a4d", "#e6f0ff"] },
                        { id: "A3", label: { zh: "活力", en: "Vibrant", bm: "Ceria" }, colors: ["#ff4d4d", "#ffcc00", "#00cc99"] }
                    ]
                },
                {
                    id: "B",
                    title: { zh: "精细度", en: "Visuals", bm: "Visual" },
                    icon: <Icons.Layers />,
                    options: [
                        { id: "B1", label: { zh: "扁平", en: "Flat", bm: "Flat" }, preview: <div className="w-full h-8 bg-blue-500 rounded"></div> },
                        { id: "B2", label: { zh: "渐变", en: "Gradient", bm: "Gradien" }, preview: <div className="w-full h-8 bg-gradient-to-r from-blue-400 to-blue-600 rounded"></div> },
                        { id: "B3", label: { zh: "3D", en: "3D", bm: "3D" }, preview: <div className="w-full h-8 bg-gradient-to-br from-blue-300 to-blue-800 rounded shadow-inner"></div> }
                    ]
                },
                {
                    id: "C",
                    title: { zh: "色调", en: "Tone", bm: "Nada" },
                    icon: <Icons.Zap />,
                    options: [
                        { id: "C1", label: { zh: "冷色", en: "Cool", bm: "Sejuk" }, gradient: "linear-gradient(90deg, #1e3a8a, #3b82f6)" },
                        { id: "C2", label: { zh: "暖色", en: "Warm", bm: "Panas" }, gradient: "linear-gradient(90deg, #991b1b, #ef4444)" },
                        { id: "C3", label: { zh: "中性", en: "Grey", bm: "Kelabu" }, gradient: "linear-gradient(90deg, #374151, #9ca3af)" }
                    ]
                },
                {
                    id: "D",
                    title: { zh: "背景", en: "Theme", bm: "Tema" },
                    icon: <Icons.SunMoon />,
                    options: [
                        { id: "D1", label: "Dark", bg: "#1a1a1a", text: "#ffffff" },
                        { id: "D2", label: "Light", bg: "#ffffff", text: "#1a1a1a" }
                    ]
                },
                {
                    id: "E",
                    title: { zh: "布局", en: "Layout", bm: "Susunan" },
                    icon: <Icons.Layout />,
                    options: [
                        { id: "E1", label: { zh: "单栏", en: "Single", bm: "Satu" }, preview: <div className="h-6 w-full bg-gray-200 rounded"></div> },
                        { id: "E2", label: { zh: "网格", en: "Grid", bm: "Grid" }, preview: <div className="grid grid-cols-2 gap-1"><div className="h-6 bg-gray-200 rounded"></div><div className="h-6 bg-gray-200 rounded"></div></div> }
                    ]
                },
                {
                    id: "F",
                    title: { zh: "字体调性", en: "Typography", bm: "Tipografi" },
                    icon: <Icons.Type />,
                    options: [
                        { id: "F1", label: { zh: "现代无衬线", en: "Modern Sans", bm: "Sans Moden" }, preview: <div className="text-sm font-sans border p-1 rounded bg-gray-50 text-center">Aa Bb (Modern)</div> },
                        { id: "F2", label: { zh: "经典有衬线", en: "Classic Serif", bm: "Serif Klasik" }, preview: <div className="text-sm font-serif border p-1 rounded bg-gray-50 text-center">Aa Bb (Classic)</div> },
                        { id: "F3", label: { zh: "科技等宽", en: "Tech Mono", bm: "Mono Tekno" }, preview: <div className="text-sm font-mono border p-1 rounded bg-gray-50 text-center">Aa Bb (Tech)</div> }
                    ]
                },
                {
                    id: "G",
                    title: { zh: "信息密度", en: "Visual Density", bm: "Ketumpatan" },
                    icon: <Icons.Maximize />,
                    options: [
                        { id: "G1", label: { zh: "宽敞留白", en: "Loose", bm: "Luas" }, preview: <div className="flex flex-col gap-3 p-1 border rounded bg-gray-50"><div className="h-2 w-1/2 bg-gray-300 rounded"></div><div className="h-2 w-1/3 bg-gray-300 rounded"></div></div> },
                        { id: "G2", label: { zh: "平衡适中", en: "Balanced", bm: "Seimbang" }, preview: <div className="flex flex-col gap-1.5 p-1 border rounded bg-gray-50"><div className="h-2 w-full bg-gray-300 rounded"></div><div className="h-2 w-2/3 bg-gray-300 rounded"></div></div> },
                        { id: "G3", label: { zh: "紧凑高效", en: "Compact", bm: "Padat" }, preview: <div className="grid grid-cols-3 gap-1 p-1 border rounded bg-gray-50"><div className="h-4 bg-gray-300 rounded"></div><div className="h-4 bg-gray-300 rounded"></div><div className="h-4 bg-gray-300 rounded"></div></div> }
                    ]
                }
            ]
        };

        function App() {
            const [lang, setLang] = useState('zh');
            const [step, setStep] = useState(0);
            const [sel, setSel] = useState({});
            const [done, setDone] = useState(false);

            const t = CONFIG.i18n[lang];
            const q = CONFIG.questions[step];

            const waUrl = useMemo(() => {
                let msg = `Hi HMA Digital, here are my design preferences:\n\n`;
                CONFIG.questions.forEach(item => {
                    const o = item.options.find(opt => opt.id === sel[item.id]);
                    if(o) msg += `*${item.title.en}*: ${o.label.en || o.label}\n`;
                });
                return `https://wa.me/${CONFIG.phoneNumber}?text=${encodeURIComponent(msg)}`;
            }, [sel]);

            const next = () => step < CONFIG.questions.length - 1 ? setStep(step + 1) : setDone(true);
            const prev = () => step > 0 && setStep(step - 1);

            if (done) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-50">
                    <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-10 text-center border border-gray-100">
                        <div className="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-8 text-white shadow-lg shadow-green-100">
                            <Icons.Check />
                        </div>
                        <h2 className="text-2xl font-black mb-10">{t.completed}</h2>
                        <a 
                            href={waUrl}
                            className="block w-full bg-green-600 text-white font-black py-5 rounded-2xl mb-6 shadow-xl shadow-green-100 active:scale-95 transition-all text-lg"
                        >
                            {t.send}
                        </a>
                        <button onClick={() => {setStep(0); setSel({}); setDone(false);}} className="text-gray-400 font-bold">{t.restart}</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 text-gray-900">
                    <header className="w-full bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50">
                        <h1 className="font-black text-gray-900">{CONFIG.businessName}</h1>
                        <div className="flex bg-gray-100 p-1 rounded-xl">
                            {['en', 'bm', 'zh'].map(l => (
                                <button key={l} onClick={() => setLang(l)} className={`px-3 py-1.5 text-[10px] font-black rounded-lg ${lang === l ? 'bg-white text-green-600 shadow-sm' : 'text-gray-400'}`}>{l.toUpperCase()}</button>
                            ))}
                        </div>
                    </header>

                    <div className="flex-1 w-full max-w-xl mx-auto p-5">
                        <div className="mb-10 mt-4 text-center px-4">
                            <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
                                <div className="h-full bg-green-500 transition-all duration-500" style={{width:`${((step+1)/CONFIG.questions.length)*100}%`}}></div>
                            </div>
                        </div>

                        <div className="bg-white rounded-[2.5rem] shadow-xl p-8 border border-gray-100">
                            <div className="flex items-center gap-4 mb-10">
                                <div className="p-4 bg-green-50 text-green-600 rounded-2xl">{q.icon}</div>
                                <h2 className="text-2xl font-black">{q.title[lang]}</h2>
                            </div>

                            <div className="grid grid-cols-2 gap-4 mb-10">
                                {q.options.map(o => (
                                    <div 
                                        key={o.id} 
                                        onClick={() => setSel({...sel, [q.id]: o.id})} 
                                        className={`p-5 rounded-3xl border-2 cursor-pointer flex flex-col h-full transition-all ${sel[q.id] === o.id ? 'border-green-600 bg-green-50 scale-[0.98]' : 'border-gray-50 bg-gray-50 hover:border-gray-200'}`}
                                    >
                                        <div className="flex justify-between mb-3 text-xs font-black">{o.label[lang] || o.label}{sel[q.id] === o.id && <span className="text-green-600"><Icons.Check /></span>}</div>
                                        <div className="flex-1">
                                            {o.colors && <div className="flex gap-1 mb-3">{o.colors.map(c => <div key={c} className="h-3 flex-1 rounded-full shadow-sm" style={{backgroundColor:c}}></div>)}</div>}
                                            {o.gradient && <div className="h-3 w-full rounded-full mb-3" style={{background:o.gradient}}></div>}
                                            {o.preview && <div className="mb-3">{o.preview}</div>}
                                            {o.bg && <div className="h-8 rounded-xl border mb-3 flex items-center justify-center text-[8px] font-bold" style={{backgroundColor:o.bg, color:o.text}}>Aa</div>}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="flex gap-4">
                                <button onClick={prev} disabled={step===0} className={`flex-1 py-5 font-black rounded-2xl ${step===0?'text-gray-200':'text-gray-400 active:bg-gray-50'}`}>{t.prev}</button>
                                <button onClick={next} disabled={!sel[q.id]} className={`flex-[2] py-5 font-black rounded-2xl shadow-lg transition-all active:scale-95 ${sel[q.id]?'bg-green-600 text-white shadow-green-100':'bg-gray-100 text-gray-300'}`}>{step === CONFIG.questions.length-1 ? t.viewResult : t.next}</button>
                            </div>
                        </div>
                    </div>
                    <footer className="py-8 text-center"><p className="text-[10px] font-black text-gray-300 uppercase tracking-widest">© 2026 {CONFIG.businessName}</p></footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
